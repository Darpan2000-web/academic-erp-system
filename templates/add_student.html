<!DOCTYPE html>
<html>
<head>
    <title>Add Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">
        <div class="card-header bg-dark text-white text-center">
            <h3>Add Student</h3>
        </div>

        <div class="card-body">

            <form method="POST">

                <div class="mb-3">
                    <label>Student ID</label>
                    <input name="student_id" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label>Name</label>
                    <input name="name" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label>Roll</label>
                    <input name="roll" class="form-control">
                </div>

                <div class="mb-3">
                    <label>Mobile</label>
                    <input name="mobile" class="form-control">
                </div>

                <div class="mb-3">
                    <label>Email</label>
                    <input name="email" class="form-control">
                </div>

                <div class="mb-3">
                    <label>Academic Year</label>
                    <input name="academic_year" placeholder="2026-2029" class="form-control">
                </div>

                <div class="mb-3">
                    <label>Semester</label>
                    <select name="semester" class="form-select">
                        <option value="3">Sem 3</option>
                        <option value="4">Sem 4</option>
                        <option value="6">Sem 6</option>
                    </select>
                </div>

                <button class="btn btn-success w-100">Save Student</button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
