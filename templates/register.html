<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New User Registration</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    margin:0;
    padding:0;
    font-family:Arial, Helvetica, sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(-45deg,#ff6b6b,#6c5ce7,#00cec9,#feca57);
    background-size:400% 400%;
    animation:bgmove 10s ease infinite;
}

@keyframes bgmove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.login-box,
.register-box{
    width:100%;
    max-width:460px;
    background:rgba(255,255,255,0.18);
    backdrop-filter:blur(14px);
    padding:35px;
    border-radius:22px;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
    border:1px solid rgba(255,255,255,0.3);
}

.title{
    font-size:34px;
    font-weight:700;
    color:white;
    text-align:center;
}

.sub-title{
    color:#f1f1f1;
    text-align:center;
    margin-bottom:20px;
}

.form-control{
    height:48px;
    border-radius:10px;
}

.btn-success{
    height:48px;
    font-weight:600;
    border-radius:10px;
}

a{
    color:white;
    text-decoration:none;
}

a:hover{
    text-decoration:underline;
}
</style>
</head>
<body>

<div class="register-box">

    <div class="text-center mb-4">
        <div class="title">Register</div>
        <div class="sub-title">Create Your ERP Account</div>
    </div>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for msg in messages %}
          <div class="alert alert-warning alert-dismissible fade show" role="alert">
            {{ msg }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST">

        <div class="mb-3">
            <input type="text"
                   name="name"
                   class="form-control"
                   placeholder="Full Name"
                   required>
        </div>

        <div class="mb-3">
            <input type="text"
                   name="phone"
                   class="form-control"
                   placeholder="10 Digit Mobile Number"
                   required>
        </div>

        <div class="mb-3">
            <input type="email"
                   name="email"
                   class="form-control"
                   placeholder="Email Address"
                   required>
        </div>

        <div class="mb-3">
            <input type="password"
                   name="password"
                   class="form-control"
                   placeholder="Password (Ex: Abc@123)"
                   required>
        </div>

        <div class="d-grid mb-3">
            <button type="submit" class="btn btn-success btn-register">
                Register
            </button>
        </div>

    </form>

    <div class="text-center link-area">
        <a href="/login">Back to Login</a>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
