<!DOCTYPE html>
<html>
<head>
    <title>Attendance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">
        <div class="card-header bg-dark text-white text-center">
            📊 Daily Attendance Entry
        </div>

        <div class="card-body">

            <form method="POST">

                <div class="row">

                    <div class="col-md-4">
                        <label>Semester</label>
                        <select name="semester" class="form-select">
                            <option value="3">Sem 3</option>
                            <option value="4">Sem 4</option>
                            <option value="5">Sem 5</option>
                            <option value="6">Sem 6</option>
                        </select>
                    </div>

                    <div class="col-md-4">
                        <label>Date</label>
                        <input type="date" name="date" value="{{ today }}" class="form-control">
                    </div>

                    <div class="col-md-4">
                        <label>No. of Present Students</label>
                        <input type="number" name="present" class="form-control">
                    </div>

                </div>

                <div class="text-center mt-4">
                    <button class="btn btn-success px-5">Submit</button>
                    <a href="/" class="btn btn-secondary">Back</a>
                </div>

            </form>

            <!-- 🔍 NEW BUTTON -->
            <div class="text-center mt-3">
                <a href="/view_attendance" class="btn btn-info">
                    🔍 View Previous Attendance
                </a>
            </div>

        </div>
    </div>

</div>

</body>
</html>
