<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERP Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    margin:0;
    padding:0;
    font-family:Arial, Helvetica, sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(135deg,
    #0a0a0a 0%,
    #111827 25%,
    #0d6efd 55%,
    #ff7b00 100%);
}

.login-box,
.register-box{
    width:100%;
    max-width:460px;
    background:rgba(255,255,255,0.10);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);

    border:1px solid rgba(255,255,255,0.15);
    border-radius:22px;
    padding:35px;

    box-shadow:0 12px 35px rgba(0,0,0,0.45);
}

.title{
    font-size:34px;
    font-weight:700;
    color:#ffffff;
    text-align:center;
}

.sub-title{
    color:#d1d5db;
    text-align:center;
    margin-bottom:20px;
}

.form-control{
    height:48px;
    border-radius:10px;
    border:none;
}

.form-control:focus{
    box-shadow:0 0 0 0.2rem rgba(13,110,253,0.35);
}

.btn-success{
    height:48px;
    border-radius:10px;
    font-weight:600;
    background:#ff7b00;
    border:none;
}

.btn-success:hover{
    background:#e56f00;
}

a{
    color:#ffffff;
    text-decoration:none;
}

a:hover{
    color:#ffcc80;
    text-decoration:underline;
}

.alert{
    border-radius:10px;
}
</style>
</head>
<body>

<div class="login-box">

    <div class="text-center mb-4">
        <img src="{{ url_for('static', filename='logo.png') }}" class="logo mb-2">
        <div class="title">Department Login</div>
        <div class="sub-title">Wellcome to CST Department</div>
    </div>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for msg in messages %}
          <div class="alert alert-warning alert-dismissible fade show" role="alert">
            {{ msg }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST">

        <div class="mb-3">
            <input type="text" 
                   name="username" 
                   class="form-control" 
                   placeholder="Email or Mobile Number"
                   required>
        </div>

        <div class="mb-3">
            <input type="password" 
                   name="password" 
                   class="form-control" 
                   placeholder="Password"
                   required>
        </div>

        <div class="d-grid mb-3">
            <button type="submit" class="btn btn-success btn-login">
                Login
            </button>
        </div>

    </form>

    <div class="text-center link-area">
        <a href="/forgot">Forgot Password?</a>
        <span class="mx-2">|</span>
        <a href="/register">New Registration</a>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
