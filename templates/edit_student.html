<!DOCTYPE html>
<html>
<head>
    <title>Edit Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">
        <div class="card-header bg-dark text-white text-center">
            ✏️ Edit Student
        </div>

        <div class="card-body">

            <form method="POST">

                <div class="mb-3">
                    <label>Name</label>
                    <input name="name" value="{{ student.name }}" class="form-control">
                </div>

                <div class="mb-3">
                    <label>Roll</label>
                    <input name="roll" value="{{ student.roll_number }}" class="form-control">
                </div>

                <div class="mb-3">
                    <label>Mobile</label>
                    <input name="mobile" value="{{ student.mobile }}" class="form-control">
                </div>

                <div class="mb-3">
                    <label>Email</label>
                    <input name="email" value="{{ student.email }}" class="form-control">
                </div>

                <!-- 🔥 ADD THIS -->
                <div class="mb-3">
                    <label>Semester</label>
                    <select name="semester" class="form-select">
                        
                        <option value="3" {% if student.semester == 3 %}selected{% endif %}>Sem 3</option>
                        <option value="4" {% if student.semester == 4 %}selected{% endif %}>Sem 4</option>
                        <option value="5" {% if student.semester == 5 %}selected{% endif %}>Sem 5</option>
                        <option value="6" {% if student.semester == 6 %}selected{% endif %}>Sem 6</option>
                    </select>
                </div>

                <!-- 🔥 ADD THIS -->
                <div class="mb-3">
                    <label>Academic Year</label>
                    <input name="academic_year" value="{{ student.academic_year }}" class="form-control">
                </div>

                <button class="btn btn-success w-100">Update</button>

            </form>

        </div>
    </div>

</div>

</body>
</html>
